# name = "normal_score_variance"

[[metrics]]
type = "phoenix.pipeline.experiments.anomaly_detection.metric.PipelineADInferenceTime"
name = "avg_inference_time_seconds"

[[metrics]]
type = "phoenix.pipeline.experiments.anomaly_detection.metric.PipelineADMissRate"
target_missing_rate = 0.01

[[metrics]]
type = "phoenix.pipeline.experiments.anomaly_detection.metric.PipelineADFalsePositiveRate"
target_missing_rate = 0.01




[algorithm_config]
backbone_name        = "model1"
resize_size          = 256
vision_server_url    = "http://127.0.0.1:8888"
use_fused            = true
target_missing_rate  = 0.01
# gradient_clipping = { norm_type = 2, max_value = 1.0 }
loss_function        = { name = "stpm_loss" }

# データセット設定・学習設定は experimental_dataset_config.toml で上書き可能
[training_config]
n_epochs              = 10
training_batch_size   = 8
validation_batch_size = 8

[training_config.optimizer]
name          = "Adam"
learning_rate = 0.0001

[prediction_config]
use_onnx_model = true

# 異常検知実験 設定ファイル

experiment_name = "STFPM"

# 実験結果の出力先ルートディレクトリ
# 各出力先は experiment_directory / experiment_name / dataset_name / ... に自動的に組み立てられる
experiment_directory = 'C:\Users\VRAINSolutionMakoFuj\workspace\Experiment\performance-realdata'

#train_loop = [5, 10, 20, 50, 100, 200]
train_loop = [50]


dataset_type          = "phoenix.pipeline.experiments.anomaly_detection.dataset.ADCocoDataset"
algorithm_type        = "phoenix.pipeline.experiments.anomaly_detection.STFPM1.algorithm.STPMAlgorithm"
algorithm_config_type = "phoenix.pipeline.experiments.anomaly_detection.STFPM1.algorithm_config.STPMAlgorithmConfig"
dataset_config_type   = "phoenix.pipeline.experiments.anomaly_detection.experimental_dataset_config.ADDatasetConfig"
training_config_type  = "phoenix.pipeline.experiments.anomaly_detection.STFPM1.experimental_training_config.STPMTrainingConfig"
prediction_config_type = "phoenix.pipeline.experiments.anomaly_detection.STFPM1.experimental_prediction_config.STPMPredictionConfig"
metric_evaluator_type = "phoenix.pipeline.experiments.anomaly_detection.metric_evaluator.ADMetricEvaluator"

[[metrics]]
type = "phoenix.pipeline.experiments.anomaly_detection.metric.PipelineADImageAUROC"
name = "image_auroc"

[[metrics]]
type = "phoenix.pipeline.experiments.anomaly_detection.metric.PipelineADImageAP"
name = "image_ap"


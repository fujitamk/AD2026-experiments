[[metrics]]
type = "phoenix.pipeline.experiments.anomaly_detection.metric.PipelineADPerDefectImageAUROC"
name = "per_defect_image_auroc"

[[metrics]]
type = "phoenix.pipeline.experiments.anomaly_detection.metric.PipelineADPerDefectImageAP"
name = "per_defect_image_ap"

# [[metrics]]
# type = "phoenix.pipeline.experiments.anomaly_detection.metric.PipelineADPerDefectPixelAUROC"
# name = "per_defect_pixel_auroc"

